<!DOCTYPE html>
<html>
<head>
  <title>Joke Fetcher</title>
</head>
<body>

  <h2>Joke Generator</h2>

  <button onclick="getJoke('general')">😀 Funny</button>
  <button onclick="getJoke('programming')">💻 Programming</button>
  <button onclick="getJoke('knock-knock')">🚪 Knock-Knock</button>
  <button onclick="getJoke('dad')">👴 Dad Joke</button>

  <p id="setup"></p>
  <p id="punchline"></p>

  <script>
    function getJoke(category) {
      // build the URL based on which button was clicked
      const url = "https://official-joke-api.appspot.com/jokes/" + category + "/random";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          // this API returns an ARRAY with one joke inside: [{...}]
          const joke = data[0];
          document.getElementById("setup").innerText = joke.setup;
          document.getElementById("punchline").innerText = joke.punchline;
        })
        .catch(error => {
          document.getElementById("setup").innerText = "Something went wrong!";
          console.log(error);
        });
    }
  </script>

</body>
</html>
